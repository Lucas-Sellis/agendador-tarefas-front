<mat-card class="meus-dados-card">
  <mat-card-header class="meus-dados-header">
    <mat-card-title class="meus-dados-titulo">Meus Dados</mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <form [formGroup]="form">
      <mat-form-field class="full-width"> <!-- essa class traz o estilo global la que aumenta o tamanho do campo do input -->
        <mat-label>Nome</mat-label>
        <input matInput formControlName="nome" /> 
      </mat-form-field>
      <mat-form-field class="full-width"> <!-- essa class traz o estilo global la que aumenta o tamanho do campo do input -->
        <mat-label>Email</mat-label>
        <input matInput formControlName="email" />
      </mat-form-field>
    </form>
  </mat-card-content>
  <mat-card-actions>
    <button matButton>Learn More</button>
  </mat-card-actions>
</mat-card>
